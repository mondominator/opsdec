services:
  opsdec:
    build: .
    container_name: opsdec
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=local-dev-secret-change-in-production
      - API_KEY_ENCRYPTION_KEY=
      - TZ=UTC
      - PUID=1000
      - PGID=1000
      # Servers are configured via the UI — no env vars needed
      # - EMBY_URL=
      # - PLEX_URL=
      # - AUDIOBOOKSHELF_URL=
      # - SAPPHO_URL=
      - POLL_INTERVAL=30
    networks:
      - opsdec

networks:
  opsdec:
    name: opsdec
